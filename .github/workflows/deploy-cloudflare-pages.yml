name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

env:
  SITE_URL: https://blog.playlab.eu.cc
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}

  deployment-config-missing:
    name: Missing Deployment Config
    runs-on: ubuntu-latest
    if: ${{ !(env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT != '') }}
    steps:
      - name: Explain missing settings
        run: |
          echo "Cloudflare Pages 自动部署未执行。" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "请在 GitHub 仓库中补齐以下配置：" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secret: CLOUDFLARE_API_TOKEN" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secret: CLOUDFLARE_ACCOUNT_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "- Variable: CLOUDFLARE_PAGES_PROJECT" >> "$GITHUB_STEP_SUMMARY"

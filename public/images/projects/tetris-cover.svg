<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Game First Tetris cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121826"/>
      <stop offset="55%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#2a9d8f"/>

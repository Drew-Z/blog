<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo Lab Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top, #2a356b, #0a0f1f 60%);
        color: #f4f7ff;
      }
      .demo {
        width: min(720px, calc(100% - 32px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        text-align: center;
      }
      h1 { margin-top: 0; }
      p { color: #b8c1df; line-height: 1.7; }
    </style>
  </head>
  <body>
    <div class="demo">
      <h1>Echo Lab Web Demo 占位页</h1>
      <p>这里是之后放置 Godot HTML5 导出包的位置。</p>
      <p>当你导出正式版本后，用导出的文件替换这个目录里的内容即可。</p>
    </div>
  </body>
</html>
